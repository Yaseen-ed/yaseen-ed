<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Event | Yaseen Ed</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; } .serif-font { font-family: 'Playfair Display', serif; }</style>
</head>
<body class="bg-[#FAF9F6]">

    <!-- Nav -->
    <nav class="bg-white shadow-sm border-b border-gray-100 py-4 px-6 flex justify-between items-center">
        <a href="index.html" class="serif-font text-2xl font-bold text-[#B59410]">YASEEN ED</a>
        <div class="space-x-6 text-sm uppercase tracking-wider font-medium">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html" class="text-[#B59410]">Contact</a>
        </div>
    </nav>

    <!-- Booking Form Section -->
    <section class="max-w-3xl mx-auto px-6 py-16">
        <div class="bg-white p-8 md:p-12 rounded shadow-sm border border-gray-100">
            <h2 class="serif-font text-3xl font-bold text-center mb-2">Let's Design Your Event</h2>
            <p class="text-center text-gray-500 text-sm mb-10">Fill out the details below, and our team will get back to you with a custom proposal.</p>
            
            <form action="#" method="POST" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs uppercase tracking-wider font-semibold text-gray-600 block mb-2">Full Name</label>
                        <input type="text" required class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-[#B59410]">
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-wider font-semibold text-gray-600 block mb-2">Phone Number</label>
                        <input type="tel" required class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-[#B59410]">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs uppercase tracking-wider font-semibold text-gray-600 block mb-2">Event Date</label>
                        <input type="date" required class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-[#B59410]">
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-wider font-semibold text-gray-600 block mb-2">Event Type</label>
                        <select class="w-full border border-gray-200 rounded p-3 text-sm bg-white focus:outline-none focus:border-[#B59410]">
                            <option>Wedding & Reception</option>
                            <option>Haldi / Mehendi</option>
                            <option>Corporate Gala</option>
                            <option>Birthday / Private Party</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-xs uppercase tracking-wider font-semibold text-gray-600 block mb-2">Additional Ideas or Requirements</label>
                    <textarea rows="4" class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-[#B59410]" placeholder="Tell us about your preferred color theme, venue location, etc."></textarea>
                </div>

                <button type="submit" class="w-full bg-[#B59410] text-white py-4 rounded text-sm uppercase font-bold tracking-widest hover:bg-[#94780D] transition cursor-pointer">Submit Consultation Request</button>
            </form>
        </div>
    </section>

    <!-- Floating WhatsApp Feature -->
    <a href="https://wa.me/9685052842" target="_blank" class="fixed bottom-6 right-6 bg-[#25D366] text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition z-50">
    <i class="fa-brands fa-whatsapp text-4xl"></i>
</a>

</body>
</html>
